<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Repères du jour</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page {
  display: none;
  text-align: center;
  max-width: 1000px;
  padding: 40px;
}

.page.active {
  display: block;
}

h1 {
  font-size: 90px;
  margin-bottom: 60px;
}

p {
  font-size: 60px;
  margin: 20px 0;
}
</style>
</head>
<body>

<script>
var csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS2BFQnnV9rnQfSK_sGQYs19HOSIqIdiS0lsZhPssu1A_M9E5lKvhzccNQMfYC2xwh_oF_oKXQ5mfpo/pub?output=csv";

var pages = [];
var currentPage = 0;

function parseCSVLine(line) {
  var result = [];
  var current = "";
  var inQuotes = false;

  for (var i = 0; i < line.length; i++) {
    var char = line[i];

    if (char === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function construirePages(data) {
  var lines = data.trim().split(/\r?\n/);

  if (lines.length <= 1) {
    return;
  }

  document.body.innerHTML = "";
  pages = [];

  for (var i = 1; i < lines.length; i++) {
    var cols = parseCSVLine(lines[i]);

    if (!cols[1]) {
      continue;
    }

    var div = document.createElement("div");
    div.className = "page";

    var html = "<h1>" + (cols[1] || "") + "</h1>";

// Image 1 (Jérémie)
if (cols[5]) {
  html += "<div style='margin:20px'>";
  html += "<img src='" + cols[5] + "' style='max-width:250px;border-radius:10px;'>";
  html += "</div>";
}

// Texte
if (cols[2]) html += "<p>" + cols[2] + "</p>";
if (cols[3]) html += "<p>" + cols[3] + "</p>";
if (cols[4]) html += "<p>" + cols[4] + "</p>";

// Image 2 (Dorothée)
if (cols[6]) {
  html += "<div style='margin:20px'>";
  html += "<img src='" + cols[6] + "' style='max-width:250px;border-radius:10px;'>";
  html += "</div>";
}

    div.innerHTML = html;
    document.body.appendChild(div);
    pages.push(div);
  }

  if (pages.length > 0) {
    currentPage = 0;
    pages[0].classList.add("active");
  }
}

function chargerDonnees() {
  var urlSansCache = csvUrl + "&t=" + new Date().getTime();

  fetch(urlSansCache, { cache: "no-store" })
    .then(function(response) {
      return response.text();
    })
    .then(function(data) {
      construirePages(data);
    })
    .catch(function() {
      document.body.innerHTML = "<div style='font-size:40px;text-align:center;'>Erreur de chargement du tableau</div>";
    });
}

setInterval(function() {
  if (pages.length === 0) return;

  pages[currentPage].classList.remove("active");
  currentPage = (currentPage + 1) % pages.length;
  pages[currentPage].classList.add("active");
}, 20000);

setInterval(function() {
  chargerDonnees();
}, 80000);

window.onload = function() {
  chargerDonnees();
};
</script>

</body>
</html>
